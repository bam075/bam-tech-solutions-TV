<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAM TECH SOLUTIONS TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Hii inasaidia kucheza video za Live Stream -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>

    <style>
        :root {
            --bg:#020409; --bg2:#080d1c; --bg3:#0d1428;
            --gold:#c9a04d; --gold2:#f0cf86; --gold3:#7a5c1e;
            --ice:#4fd1ff; --signal:#ff4757; --green:#2ed573;
            --text:#eef1f8; --text2:#a8b3cc; --text3:#4a5568;
            --border:rgba(201,160,77,0.18); --border2:rgba(255,255,255,0.06);
            --r:14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        body::before { 
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 2px); 
        }
        #glow { 
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(700px circle at var(--mx,50%) var(--my,30%), rgba(201,160,77,0.12) 0%, rgba(79,209,255,0.06) 35%, transparent 65%); 
        }

        /* Hapa tumeweka urembo wa mpangilio wa video yako */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-family: 'Sora', sans-serif;
            color: var(--gold);
            margin-bottom: 25px;
            font-size: 2rem;
            text-align: center;
        }
        .video-box {
            width: 100%;
            max-width: 800px;
            background: var(--bg2);
            border: 2px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Huu ndio mwanga wa background ulioweka -->
    <div id="glow"></div>

    <main>
        <!-- Jina la TV yako -->
        <h1>BAM TECH SOLUTIONS TV</h1>

        <!-- Sehemu ya Video -->
        <div class="video-box">
            <video id="video" controls autoplay muted></video>
        </div>
    </main>

    <!-- Code ya JavaScript inayowezesha video kucheza -->
    <script>
        var video = document.getElementById('video');
        
        // Hapa nimeweka video ya mfano (test video). Baadaye utaweka link yako ya OBS
        var videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'; 

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
